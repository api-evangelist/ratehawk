  - url: https://docs.emergingtravel.com/docs/b2b-api/endpoints/
    type: APIReference
  - url: openapi/ratehawk-openapi.yml
    type: OpenAPI
  - url: collections/ratehawk.postman_collection.json
    type: PostmanCollection
