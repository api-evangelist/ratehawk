aid: ratehawk
url: https://raw.githubusercontent.com/api-evangelist/ratehawk/refs/heads/main/apis.yml
name: RateHawk
kind: company
description: RateHawk is the B2B hotel and travel booking brand of Emerging Travel
  Group (ETG). Its Partner API (pAPI v3, served from api.worldota.net) gives OTAs,
  travel platforms, and agencies programmatic access to 2.5M+ properties with net
  rates, covering hotel search, prebook, the asynchronous order booking flow, static
  hotel content, and cancellation over a JSON REST interface secured with HTTP Basic
  auth.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Travel
- Hotels
- Booking
- B2B
- Reservations
created: '2026-06-25'
modified: '2026-06-25'
specificationVersion: '0.19'
apis:
- aid: ratehawk:hotel-search
  name: RateHawk Hotel Search API
  tags:
  - Hotel Search
  - SERP
  - Availability
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.emergingtravel.com/docs/b2b-api/hotel-search/
