- aid: ratehawk:hotel-page-prebook
  name: RateHawk Hotel Page / Prebook API
  tags:
  - Hotel Page
  - Prebook
  - Rate Confirmation
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.emergingtravel.com/docs/b2b-api/hotel-search/retrieve-hotelpage/
