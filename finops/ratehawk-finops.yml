meters:
- name: confirmed_bookings
  description: Confirmed hotel reservations billed at the contracted net rate.
  unit: bookings
  aggregation: sum
  dimensions:
  - contract
  - hotel
  - currency
- name: booking_amount
  description: Net amount payable per confirmed booking in the booking currency.
  unit: currency
  aggregation: sum
  dimensions:
  - contract
  - currency
- name: cancellation_charges
  description: Charges applied when cancelling non-refundable or partially refundable rates.
  unit: currency
  aggregation: sum
  dimensions:
  - contract
  - currency
- name: upsell_charges
  description: Optional upsell costs (early check-in / late check-out) added to a booking.
  unit: currency
  aggregation: sum
  dimensions:
  - contract
  - currency
principles:
- name: Visibility
  description: Reconcile ETG settlement statements; track net spend per booking, currency, and cancellation.
- name: Allocation
  description: Tag bookings by partner_order_id and internal cost center / brand.
- name: Optimization
  description: Use Prebook to actualize rates before booking; prefer refundable rates where margin allows; avoid cancellation charges on non-refundable inventory.
- name: Accountability
  description: Assign owners per contract and review booked spend and cancellation losses each settlement cycle.
