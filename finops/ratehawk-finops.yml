description: >-
  FinOps view of RateHawk / ETG pAPI v3 spend. Unlike metered API products,
  cost here is the booked travel inventory: partners pay negotiated net
  (wholesale) rates per confirmed hotel booking and settle under contracted
  deposit / credit terms, while ETG earns the net-to-sell margin. There is no
  public per-call API charge; the unit of spend is the confirmed reservation
  (and any cancellation charges on non-refundable rates). Numeric rates are
  contracted, so this artifact is not reconciled to specific amounts.
notes: >-
  Reconcile against the signed partner agreement and ETG settlement
  statements. Track spend per confirmed booking, currency, and cancellation
  charges rather than per API request.
